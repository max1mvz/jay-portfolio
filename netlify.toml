# Netlify configuration — static site, no build step.
[build]
  publish = "."
  command = ""

# The Reel is the default landing page. Visiting the root ("/") redirects to the
# cinematic reel; the classic homepage stays reachable at /index.html
# (linked from the reel as "CLASSIC SITE ↗").
[[redirects]]
  from = "/"
  to = "/cinema/"
  status = 302
  force = true
