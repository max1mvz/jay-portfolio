# Netlify configuration — static site, no build step.
[build]
  publish = "."
  command = ""

# The Reel is the default landing page. Visiting the root ("/") redirects to the
# cinematic reel; the classic homepage lives at /home.html (renamed from
# index.html so it no longer collides with "/" and gets caught in a redirect
# loop). It is linked from the reel as "CLASSIC SITE ↗".
[[redirects]]
  from = "/"
  to = "/cinema/"
  status = 302
  force = true
