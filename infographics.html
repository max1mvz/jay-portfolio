<body>
  <div class="bg-mesh" aria-hidden="true">

  <div class="cursor" aria-hidden="true"></div>

  <header class="case-nav">
    <a href="index.html" class="case-nav__back" data-cursor>

      <button class="lightbox__close" id="lbClose" type="button" data-cursor>Close ✕</button>

    <div class="lightbox__scroll">

  <footer class="case-foot">
