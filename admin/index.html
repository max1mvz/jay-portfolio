<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Studio — Jay Lovete</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* =========================================================
       Jay Lovete — Content Studio (Decap CMS) custom theme
       Selectors scoped under #nc-root to outrank Decap's emotion
       classes. Login = dark editorial; workspace = refined light.
       ========================================================= */
    :root {
      --ad-ink: #17150f;
      --ad-bg: #f4f3ef;
      --ad-card: #ffffff;
      --ad-text: #1c1b17;
      --ad-muted: #74706a;
      --ad-line: rgba(23, 21, 15, 0.09);
      --ad-accent: #b8935a;
      --ad-accent-deep: #997640;
      --ad-radius: 14px;
      --ad-shadow: 0 1px 2px rgba(23,21,15,.04), 0 14px 34px -20px rgba(23,21,15,.30);
    }

    html, body { background: var(--ad-bg) !important; }
    #nc-root, #nc-root * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #nc-root { color: var(--ad-text); }

    /* ---------- Custom scrollbars ---------- */
    #nc-root ::-webkit-scrollbar { width: 10px; height: 10px; }
    #nc-root ::-webkit-scrollbar-thumb { background: rgba(23,21,15,.16); border-radius: 10px; }
    #nc-root ::-webkit-scrollbar-thumb:hover { background: rgba(23,21,15,.28); }

    /* =======================================================
       LOGIN — dark editorial, branded
       ======================================================= */
    #nc-root [class*="StyledAuthenticationPage"] {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(130% 90% at 50% -20%, #2c2718 0%, rgba(44,39,24,0) 55%),
        linear-gradient(180deg, #15130c 0%, #0d0c07 100%) !important;
    }
    /* hide Decap's default logo */
    #nc-root [class*="DecapLogoIcon"] { display: none !important; }
    /* brand wordmark above the button */
    #nc-root [class*="StyledAuthenticationPage"]::before {
      content: "Jay Lovete";
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      line-height: 1;
      letter-spacing: -0.015em;
      color: #f3efe6;
      margin-bottom: 0.55rem;
    }
    /* eyebrow / sub-label */
    #nc-root [class*="StyledAuthenticationPage"] > h1,
    #nc-root [class*="StyledAuthenticationPage"] > p { display: none !important; }
    #nc-root [class*="StyledAuthenticationPage"]::after {
      content: "Content Studio";
      order: 3;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: rgba(184,147,90,0.85);
      margin-top: 1.6rem;
    }
    #nc-root [class*="LoginButton"] {
      order: 2;
      margin-top: 1.9rem !important;
      background: var(--ad-accent) !important;
      color: #15130c !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      font-size: 0.92rem !important;
      letter-spacing: 0.01em !important;
      border: 0 !important;
      border-radius: 999px !important;
      padding: 0.9rem 1.7rem !important;
      box-shadow: 0 16px 40px -14px rgba(184,147,90,.55) !important;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease !important;
    }
    #nc-root [class*="LoginButton"]:hover {
      background: #c9a86a !important;
      transform: translateY(-1px);
      box-shadow: 0 20px 46px -14px rgba(201,168,106,.6) !important;
    }

    /* =======================================================
       APP HEADER (top bar)
       ======================================================= */
    #nc-root [class*="AppHeader"]:not([class*="Button"]):not([class*="Nav"]):not([class*="Actions"]):not([class*="Content"]) {
      background: var(--ad-card) !important;
      box-shadow: 0 1px 0 var(--ad-line), 0 8px 24px -20px rgba(23,21,15,.4) !important;
      border: 0 !important;
    }
    #nc-root [class*="AppHeaderNavLink"] {
      color: var(--ad-muted) !important;
      font-weight: 500 !important;
      border-radius: 9px !important;
      transition: background .15s, color .15s;
    }
    #nc-root [class*="AppHeaderNavLink"]:hover {
      color: var(--ad-text) !important;
      background: rgba(184,147,90,.10) !important;
    }
    #nc-root [class*="AppHeaderButton"] { color: var(--ad-muted) !important; font-weight: 500 !important; }
    #nc-root [class*="AppHeaderActions"] button {
      background: var(--ad-ink) !important;
      color: #fff !important;
      border-radius: 999px !important;
      font-weight: 500 !important;
    }

    /* =======================================================
       SIDEBAR (collections nav)
       ======================================================= */
    #nc-root [class*="SidebarContainer"] {
      background: var(--ad-card) !important;
      border: 1px solid var(--ad-line) !important;
      border-radius: var(--ad-radius) !important;
      box-shadow: var(--ad-shadow) !important;
    }
    #nc-root [class*="SidebarHeading"] {
      font-family: 'Fraunces', serif !important;
      font-weight: 500 !important;
      font-size: 1.05rem !important;
      letter-spacing: -0.01em !important;
      color: var(--ad-text) !important;
    }
    #nc-root [class*="SidebarNavLink"] {
      color: var(--ad-muted) !important;
      font-weight: 500 !important;
      border-left: 0 !important;
      border-radius: 10px !important;
      margin: 2px 8px !important;
      transition: background .15s, color .15s;
    }
    #nc-root [class*="SidebarNavLink"]:hover {
      background: var(--ad-bg) !important;
      color: var(--ad-text) !important;
    }
    #nc-root [class*="sidebarNavLinkActive"],
    #nc-root [class*="SidebarNavLink"][class*="ctive"] {
      background: rgba(184,147,90,.13) !important;
      color: var(--ad-accent-deep) !important;
    }

    /* =======================================================
       COLLECTION / MAIN AREA
       ======================================================= */
    #nc-root [class*="AppMainContainer"],
    #nc-root [class*="CollectionMain"] { background: transparent !important; }
    #nc-root [class*="CollectionTopHeading"] {
      font-family: 'Fraunces', serif !important;
      font-weight: 500 !important;
      letter-spacing: -0.02em !important;
      color: var(--ad-text) !important;
    }

    /* =======================================================
       CARDS (collection + entry cards)
       ======================================================= */
    #nc-root [class*="ListCard"],
    #nc-root [class*="-card "] {
      background: var(--ad-card) !important;
      border: 1px solid var(--ad-line) !important;
      border-radius: var(--ad-radius) !important;
      box-shadow: var(--ad-shadow) !important;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    #nc-root [class*="ListCard"]:hover,
    #nc-root [class*="-card "]:hover {
      transform: translateY(-3px);
      border-color: rgba(184,147,90,.5) !important;
      box-shadow: 0 1px 2px rgba(23,21,15,.05), 0 26px 46px -24px rgba(23,21,15,.34) !important;
    }
    #nc-root [class*="ListCardTitle"],
    #nc-root [class*="cardTopHeading"] {
      font-family: 'Fraunces', serif !important;
      font-weight: 500 !important;
      color: var(--ad-text) !important;
    }

    /* =======================================================
       INPUTS / SEARCH / FORM FIELDS
       ======================================================= */
    #nc-root [class*="SearchContainer"],
    #nc-root [class*="InputContainer"] {
      border-radius: 11px !important;
      border: 1px solid var(--ad-line) !important;
      background: var(--ad-card) !important;
      box-shadow: none !important;
    }
    #nc-root input, #nc-root textarea, #nc-root select { font-family: 'Inter', sans-serif !important; }
    #nc-root input:focus, #nc-root textarea:focus, #nc-root [class*="SearchInput"]:focus {
      outline: 2px solid rgba(184,147,90,.45) !important;
      outline-offset: 1px;
    }

    /* =======================================================
       BUTTONS (generic polish for editor toolbar etc.)
       ======================================================= */
    #nc-root button { font-family: 'Inter', sans-serif !important; }
    #nc-root [class*="ViewControlsButton"] { border-radius: 9px !important; }
  </style>
</head>
<body>
  <!-- Decap CMS (formerly Netlify CMS) — Git-based content editor.
       Local editing: run `npx decap-server` then open http://localhost:4321/admin/
       Production: GitHub backend (see admin/config.yml). -->
  <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
</body>
</html>
