              - { label: "Tag", name: "tag", widget: "string", default: "A+ Content" }
              - { label: "Badge (feature card only)", name: "badge", widget: "string", required: false }
              - { label: "Case study page", name: "page", widget: "string", required: false, hint: "e.g. optiflow.html — leave blank for a placeholder tile" }
              - { label: "Cover image (gallery card thumbnail)", name: "image", widget: "image", required: false }
